<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Would You Survive the Industrial Revolution? A classroom choose-your-own-adventure game for Year 8 HASS."
    />
    <title>Would You Survive the Industrial Revolution?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-text">
        <p class="kicker">Year 8 HASS classroom game</p>
        <h1>Would You Survive the Industrial Revolution?</h1>
      </div>
      <div class="teacher-actions" aria-label="Teacher controls">
        <button id="restartTop" class="secondary-button" type="button">Restart Game</button>
      </div>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>

    <footer class="site-footer">
      <span>No login. No data storage. Runs offline in this browser.</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
